; tellovoice ESP32-S3 firmware
; Voice-controlled DJI Tello relay: browser -> cloud backend -> THIS DEVICE -> Tello UDP.
;
; This device dials OUT to the backend over a WebSocket (it lives behind the phone
; hotspot NAT and can never be reached inbound). It relays Tello SDK strings over
; UDP:8889, runs an autonomous keepalive, and has a hardware emergency-land button.
;
; Board: WEMOS/LOLIN S3 Mini (ESP32-S3). Swap `board` for your exact module if
; different (e.g. esp32-s3-devkitc-1). Both are ESP32-S3 + Arduino framework.

[env:lolin_s3_mini]
platform = espressif32
board = lolin_s3_mini
framework = arduino
board_upload.flash_size = 16MB   ; N16R8 module (16MB flash, 8MB PSRAM)

monitor_speed = 115200
upload_speed = 921600

; --- Libraries -------------------------------------------------------------
; links2004/WebSockets: outbound WS/WSS client (WiFiClientSecure under the hood).
; bblanchon/ArduinoJson: protocol frame (de)serialization (v7 API).
lib_deps =
	links2004/WebSockets@^2.4.1
	bblanchon/ArduinoJson@^7.0.4

; --- Configuration ---------------------------------------------------------
; Preferred: copy src/config.h.example -> src/config.h and edit it.
; Alternative: uncomment/edit these build flags instead (they override config.h
; defaults). Escaping quotes is fiddly here, so config.h is the easier path.
build_flags =
	-DCORE_DEBUG_LEVEL=2
	; -DWIFI_SSID='"YourHotspot"'
	; -DWIFI_PASS='"YourPassword"'
	; -DWS_HOST='"your-backend.example.com"'
	; -DWS_PORT=443
	; -DWS_USE_TLS=1
	; -DDEVICE_ID='"tello-esp32-01"'
	; -DDEVICE_TOKEN='"dev-device-token"'

; Alternative ESP32-S3 target (Espressif DevKitC):
; [env:esp32-s3-devkitc-1]
; platform = espressif32
; board = esp32-s3-devkitc-1
; framework = arduino
; monitor_speed = 115200
; lib_deps =
; 	links2004/WebSockets@^2.4.1
; 	bblanchon/ArduinoJson@^7.0.4
